{% extends 'EV station/homeindex.html' %}
{% block body %}
<form id="form1" name="form1" method="post" action="/myapp/EVstation_view_slot/">
    {% csrf_token %}
    <table class="table table-bordered">
    <tr>

       <th scope="col">FROM DATE</th>
      <th scope="col"><input type="date" class="form-control" required name="textfield" id="textfield" /></th>
      <th scope="col">TO DATE</th>
      <th scope="col"><input type="date" class="form-control" required name="textfield2" id="textfield2" /></th>
      <th scope="col"><input type="submit" name="button" id="button" value="SEARCH" class="btn btn-success"/></th>
    </tr>
  </table>
  
</form>
<table class="table table-bordered">
  <tr>
    <th scope="col">SL.NO</th>
    <th scope="col">SLOT</th>

    <th scope="col">&nbsp;</th>
    <th scope="col">&nbsp;</th>
  </tr>
    {% for i in data %}
  <tr>
    <td>{{ forloop.counter }}</td>
    <td>&nbsp;{{ i.slotno }}</td>
      <td><a href="/myapp/EVstation_edit_slot/{{ i.id }}" class="btn btn-success">Edit</a></td>
    <td><a href="/myapp/EVstation_delete_slot/{{ i.id }}" class="btn btn-danger">Delete</a></td>
{#  <td><a href="/myapp/EVstation_booking_slot/{{ i.id }}" class="btn btn-success">Booking</a></td>#}

  </tr>
    {% endfor %}
</table>
{% endblock %}
