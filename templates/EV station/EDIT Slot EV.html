{% extends 'EV station/homeindex.html' %}
{% block body %}
<form name="form1" method="post" action="/myapp/EVstation_edit_slot_post/">
    {% csrf_token %}
  <table class="table table-bordered">
      <input type="hidden" class="form-control" required name="id" value="{{ data.id }}">
    <tr>
      <th scope="col">SLOTE NO</th>
      <th scope="col"><input type="text" class="form-control" required name="textfield" id="textfield" value="{{ data.slotno }}"></th>
    </tr>
    <tr>
      <td colspan="2"><div align="center">
        <input type="submit" name="ALLOCATE" id="ALLOCATE" value="UPDATE" class="btn btn-success" />
      </div></td>
    </tr>
  </table>
</form>
{% endblock %}
