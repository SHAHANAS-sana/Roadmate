{% extends 'Fuel station/homeindex.html' %}
{% block body %}
<form name="form1" method="post" action="/myapp/Fuelstation_allocation_post/">
{% csrf_token %}
  <table class="table table-bordered">
    <tr>
      <th scope="col">STAFF </th>
        <th scope="col">
            <input type="hidden" name="id" value="{{ id }}">


            <select name="textfield" id="textfield">

            {% for i in data %}
            <option value="{{ i.id }}">{{ i.name }}</option>

            {% endfor %}



        </select></th>
    </tr>
    <tr>
      <td colspan="2"><div align="center">
        <input type="submit" name="ALLOCATE" id="ALLOCATE" value="ALLOCATE" class="btn btn-success" />
      </div></td>
    </tr>
  </table>
</form>
{% endblock %}
