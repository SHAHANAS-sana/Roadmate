{% extends 'Fuel station/homeindex.html' %}
{% block body %}
<form id="form1" name="form1" method="post" action="/myapp/Fuelstation_view_stock_post/">
    {% csrf_token %}
   <table class="table table-bordered">
    <tr>
      <th scope="col">FROM DATE</th>
      <th scope="col"><input type="date" class="form-control" required  name="textfield" id="textfield" /></th>
      <th scope="col">TO DATE</th>
      <th scope="col"><input type="date" class="form-control" required  name="textfield2" id="textfield2" /></th>
      <th scope="col"><input type="submit" name="button" id="button" value="SEARCH" class="btn btn-success" /></th>
    </tr>
  </table>
</form>
<table class="table table-bordered">
  <tr>
    <th scope="col">SL.NO</th>
    <th scope="col">FUEL</th>
    <th scope="col">DATE</th>
    <th scope="col">STOCK</th>
    <th scope="col">&nbsp;</th>
    <th scope="col">&nbsp;</th>
  </tr>
    {% for i in data %}
  <tr>
    <td>{{ forloop.counter }}</td>
    <td>{{ i.fuel }}&nbsp;</td>
    <td>{{ i.date }}&nbsp;</td>
    <td>{{ i.stock }}&nbsp;</td>
    <td><a href="/myapp/Fuelstation_edit_stock/{{ i.id }}" class="btn btn-success">Edit</a></td>
    <td><a href="/myapp/Fuelstation_delete_stock/{{ i.id }}" class="btn btn-success">Delete</a></td>
  </tr>
    {% endfor %}
</table>
{% endblock %}
