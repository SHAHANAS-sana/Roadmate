{% extends 'Fuel station/homeindex.html' %}
{% block body %}
<form id="form1" name="form1" method="post" action="/myapp/Fuelstation_view_staff_post/">
    {% csrf_token %}
  <table class="table table-bordered">
       <tr>
      <th scope="col">FROM DATE</th>
      <th scope="col"><input type="date" class="form-control" required  name="textfield" id="textfield" /></th>
      <th scope="col">TO DATE</th>
      <th scope="col"><input type="date" class="form-control" required  name="textfield2" id="textfield2" /></th>
      <th scope="col"><input type="submit" name="button" id="button" value="SEARCH" class="btn btn-success" /></th>
    </tr>
  </table>
  <table class="table table-bordered">
    <tr>
      <th scope="col">SL.NO</th>
      <th scope="col">NAME</th>
      <th scope="col">PHOTO</th>
      <th scope="col">EMAIL</th>
      <th scope="col">PHONE</th>
      <th scope="col">PLACE</th>
      <th scope="col">ADDRESS</th>
      <th scope="col">&nbsp;</th>
      <th scope="col">&nbsp;</th>
    </tr>
      {% for i in data %}
    <tr>
      <td>{{ forloop.counter }}</td>
      <td>{{ i.name }}</td>
      <td><img src="{{i.photo }}" height="100px" width="100px"></td>
      <td>{{ i.email }}</td>
      <td>{{ i.phone }}</td>
      <td>{{ i.place }}</td>
      <td>{{ i.address }}</td>
      <td><a href="/myapp/Fuelstation_edit_staff/{{ i.id }}" class="btn btn-success">Edit</a></td>
      <td><a href="/myapp/Fuelstation_delete_staff/{{ i.id }}" class="btn btn-success">Delete</a></td>
    </tr>
       {% endfor %}
  </table>
  <p>&nbsp;</p>
</form>
{% endblock %}
